<!DOCTYPE html>
<html>
<head>
  <title>Login | AI Chat App</title>

  <style>
    body{
      font-family: Arial;
      background:#eaeaea;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:white;
      width:350px;
      padding:30px;
      border-radius:12px;
      border:2px solid #ccc;
      text-align:center;
    }

    input{
      width:90%;
      padding:12px;
      margin:10px 0;
      border-radius:8px;
      border:1px solid #aaa;
    }

    button{
      padding:12px;
      width:100%;
      border:none;
      border-radius:8px;
      background:#007bff;
      color:white;
      font-size:16px;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover{
      background:#0056d2;
    }

    #msg{
      margin-top:10px;
      color:red;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <p style="text-align:right; margin-top:-5px;">
  <a href="#" onclick="forgotPassword()">Forgot Password?</a>
</p>
  <button onclick="login()">Login</button>

  <p>Don't have an account? <a href="signup.html">Create one</a></p>

  <p id="msg"></p>
</div>

<!-- ✅ Firebase Modular Script -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword ,sendPasswordResetEmail}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

var firebaseConfig = {
  apiKey: "AIzaSyCNbUVRWGinFSkfM1je-neSkvsdK7cVvSE",
  authDomain: "aichatbot-a26bc.firebaseapp.com",
  projectId: "aichatbot-a26bc",
  storageBucket: "aichatbot-a26bc.appspot.com",
  messagingSenderId: "371874279259",
  appId: "1:371874279259:web:b1157f22403c7f35f5b47e"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  if(!email || !pass){
    msg.innerText="Enter email & password";
    return;
  }

  signInWithEmailAndPassword(auth,email,pass)
    .then(()=>{
      msg.style.color="green";
      msg.innerText="Login successful";
      setTimeout(()=>window.location="chat.html",800);
    })
    .catch(err=>{
      msg.style.color="red";
      msg.innerText=err.message;
    });
};
window.forgotPassword = function(){
  const email = document.getElementById("email").value;
  const msg = document.getElementById("msg");

  if(!email){
    msg.style.color="red";
    msg.innerText="Please enter your email first";
    return;
  }

  sendPasswordResetEmail(auth, email)
    .then(()=>{
      msg.style.color="green";
      msg.innerText="Password reset email sent! Check your inbox.";
    })
    .catch((error)=>{
      msg.style.color="red";
      msg.innerText=error.message;
    });
};

</script>

</body>
</html>
