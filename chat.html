<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      height: 100vh;
      background: #343541;
      color: white;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: #202123;
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    .new-chat {
      background: #343541;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      text-align: center;
      margin-bottom: 15px;
      border: 1px solid #444;
    }

    .chat-history {
      flex: 1;
      overflow-y: auto;
    }

    .chat-item {
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 5px;
    }

    .chat-item:hover {
      background: #2a2b32;
    }

    /* MAIN CHAT */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 15px;
      background: #343541;
      border-bottom: 1px solid #444;
      font-weight: bold;
    }

    #chatBox {
      flex: 1;
      overflow-y: auto;
      padding: 30px 20%;
      display: flex;
      flex-direction: column;
    }
    /* INPUT AREA */
    .input-area {
      padding: 15px 20%;
      background: #343541;
      border-top: 1px solid #444;
    }

    .input-box {
      display: flex;
      background: #40414f;
      border-radius: 8px;
      padding: 10px;
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 15px;
      outline: none;
    }

    button {
      background: #10a37f;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
    /* USER MESSAGE (RIGHT SIDE) */
.message-row {
  display: flex;
  margin: 10px 0;
}

.user-row {
  justify-content: flex-end;
}

.bot-row {
  justify-content: flex-start;
}

.message {
  max-width: 70%;
  padding: 12px;
  border-radius: 12px;
}

.user-message {
  background: #10a37f;
  border-bottom-right-radius: 4px;
}

.bot-message {
  background: #404faa;
  border-bottom-left-radius: 4px;
}
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="new-chat" onclick="newChat()">+ New Chat</div>
    <div class="chat-history" id="chatHistory">
      <div class="chat-item">Chat 1</div>
    </div>
  </div>

  <!-- MAIN AREA -->
  <div class="main">

    <div class="chat-header">
      AI Chat
      <button style="float:right;background:red;" onclick="logout()">Logout</button>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
      <div class="input-box">
        <input id="userInput" placeholder="Message AI..." />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

  </div>

<script>

function logout(){
  window.location="login.html";
}

function newChat(){
  document.getElementById("chatBox").innerHTML="";
}

document.getElementById("userInput")
.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    sendMessage();
  }
});

//const API_KEY = "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";

async function sendMessage(){
  let input = document.getElementById("userInput").value;
  if(!input) return;

  addMessage(input, "user");
  document.getElementById("userInput").value="";

  let reply = await getBotReply(input);
  addMessage(reply, "bot");
}

function addMessage(text, sender){

  let chatBox = document.getElementById("chatBox");

  // Row (controls left/right)
  let row = document.createElement("div");
  row.className = "message-row " + (sender === "user" ? "user-row" : "bot-row");

  // Message bubble
  let message = document.createElement("div");
  message.className = "message " + (sender === "user" ? "user-message" : "bot-message");

  message.innerText = text;

  row.appendChild(message);
  chatBox.appendChild(row);

  chatBox.scrollTop = chatBox.scrollHeight;
}

let chatHistory = [];
async function getBotReply(text){
  chatHistory.push({ role: "user", content: text });
  const res = await fetch("https://aichatbot-39n0.onrender.com", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + API_KEY,
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      model: "llama-3.1-8b-instant",
      messages: [{ role: "user", content: text }]
    })
  });

  const data = await res.json();
  return data.choices[0].message.content;
  chatHistory.push({ role: "assistant", content: reply });

  return reply;
}

</script>

</body>
</html>
